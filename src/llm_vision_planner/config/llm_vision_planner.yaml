semantic_obstacle_perception:
  ros__parameters:
    detection_topic: /tflite_data
    point_cloud_topic: /tof_pc
    pose_topic: /fmu/out/vehicle_odometry
    obstacle_topic: /llm_vision/semantic_obstacles
    goal_x: 2.5
    goal_y: 0.0
    goal_z: -0.25
    hires_fx: 459.25277454251415
    hires_fy: 459.77659154648927
    hires_cx: 656.1383163463607
    hires_cy: 424.58097964738005
    hires_width: 1280
    hires_height: 768
    cam_body_x_m: 0.0665
    cam_body_y_m: -0.0065
    cam_body_z_m: -0.0154
    cam_roll_deg: 0.0
    cam_pitch_deg: 90.0
    cam_yaw_deg: 90.0
    min_confidence: 0.60
    detection_timeout_s: 1.0
    z_estimation_mode: hardcoded
    min_tof_depth_m: 0.20
    max_tof_depth_m: 6.0
    frustum_margin_deg: 5.0
    min_frustum_points: 3
    obstacle_hold_s: 3.0
    obstacle_match_distance_m: 0.75
    publish_hz: 2.0
    debug: False
    print_obstacles_period_s: 1.0

obstacle_perception:
  ros__parameters:
    point_cloud_topic: /voa_pc_out
    point_cloud_frame: auto
    pose_topic: /fmu/out/vehicle_odometry
    obstacle_topic: /llm_vision/obstacles
    goal_x: 2.5
    goal_y: 0.0
    goal_z: -0.25
    min_range_m: 0.20
    max_range_m: 4.5
    min_z_m: -2.0
    max_z_m: 1.0
    ego_exclusion_radius_m: 0.25
    dbscan_eps: 0.5
    dbscan_min_samples: 8
    debug: false

prompt_generator:
  ros__parameters:
    mode: semantic
    llm_provider: chatgpt
    chatgpt_model_name: gpt-5.4-nano
    llama_model_name: rrt_planner
    single_shot: True
    initial_plan_id: 1
    workspace_x_min: 0.0
    workspace_x_max: 4.0
    workspace_y_min: 0.0
    workspace_y_max: 4.0
    fixed_z: -0.25
    goal_x: 2.5
    goal_y: 0.0
    goal_z: -0.25
    clearance_m: 0.40
    goal_clearance_m: 0.40
    semantic_obstacle_topic: /llm_vision/semantic_obstacles
    normal_obstacle_topic: /llm_vision/obstacles
    prompt_topic: /llm_vision/prompt
    verified_plan_topic: /llm_vision/plan_verified
    mission_state_topic: /llm_vision/mission_state
    required_mission_state: HOLDING_FOR_PLAN
    require_mission_state: True
    snapshot_after_hover_s: 1.0
    prefer_nonempty_obstacle_snapshot: true
    nonempty_obstacle_wait_s: 3.0
    start_drift_replan_m: 0.25
    feedback_enabled: True
    pose_topic: /fmu/out/vehicle_odometry
    fresh_data_timeout_s: 2.0
    debug: False

llm_planner:
  ros__parameters:
    prompt_topic: /llm_vision/prompt
    plan_topic: /llm_vision/plan_raw
    model_name: gpt-5.4-nano
    llm_provider: chatgpt
    chatgpt_model_name: gpt-5.4-nano
    llama_model_name: rrt_planner
    vllm_base_url: http://172.22.224.93:8000/v1
    vllm_api_key: EMPTY
    goal_tolerance_m: 0.05
    debug: True

path_refinement:
  ros__parameters:
    raw_plan_topic: /llm_vision/plan_raw
    refined_plan_topic: /llm_vision/plan_refined
    interpolation_spacing_m: 1.0
    safety_margin_m: 0.40
    nudge_epsilon_m: 0.02
    fixed_z: -0.25
    debug: False

path_verifier:
  ros__parameters:
    refined_plan_topic: /llm_vision/plan_refined
    verified_plan_topic: /llm_vision/plan_verified
    safety_margin_m: 0.40
    interpolation_spacing_m: 1.0
    cruise_speed_mps: 0.5
    max_velocity_mps: 1.5
    max_acceleration_mps2: 1.5
    goal_tolerance_m: 0.05
    progress_tolerance_m: 0.001
    debug: True

planner_visualizer:
  ros__parameters:
    raw_plan_topic: /llm_vision/plan_raw
    refined_plan_topic: /llm_vision/plan_refined
    verified_plan_topic: /llm_vision/plan_verified
    obstacle_topic: /llm_vision/obstacles
    semantic_obstacle_topic: /llm_vision/semantic_obstacles
    pose_topic: /fmu/out/vehicle_odometry
    output_png: /tmp/llm_vision_plot.png
    show_window: true
    save_static_plots: true
    static_plot_dir: src/llm_vision_planner/plots
    static_plot_dpi: 180
    static_plot_prefix: simulated_test
    fixed_z: -0.25
    workspace_x_min: 0.0
    workspace_x_max: 4.0
    workspace_y_min: 0.0
    workspace_y_max: 4.0
    show_rrt: False
    rrt_clearance_m: 0.40
    rrt_seed: 7
    debug: False

llm_vision_mission_takeoff:
  ros__parameters:
    mission_state_topic: /llm_vision/mission_state
    offboard_owner_topic: /llm_vision/offboard_owner
    pose_topic: /fmu/out/vehicle_odometry
    takeoff_z: -0.25
    takeoff_accept_m: 0.08
    takeoff_settle_s: 2.0
    pose_timeout_s: 2.0
    prime_s: 1.5

llm_vision_trajectory_follower:
  ros__parameters:
    plan_topic: /llm_vision/plan_verified
    offboard_owner_topic: /llm_vision/offboard_owner
    pose_topic: /fmu/out/vehicle_odometry
    speed: 0.15
    accept_m: 0.2
    start_accept_m: 0.75
    pose_timeout_s: 1.0
    prime_s: 1.5
    track_timeout_s: 60.0
    land_on_track_timeout: False
    min_segment_duration_s: 8.0
    debug: true

llm_vision_trajectory_follower_continuous:
  ros__parameters:
    plan_topic: /llm_vision/plan_verified
    offboard_owner_topic: /llm_vision/offboard_owner
    pose_topic: /fmu/out/vehicle_odometry
    accept_m: 0.35
    start_accept_m: 0.75
    pose_timeout_s: 1.0
    prime_s: 1.5
    publish_hz: 20.0
    debug: true
